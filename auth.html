<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Sign Up - Ninetynine</title>
<style>
    * {margin:0;padding:0;box-sizing:border-box}
    :root {--primary:#111;--secondary:#888;--border:#eee;--success:#2d7a4f;--error:#b00020;--background:#fafafa}
    body {font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--background);color:var(--primary);line-height:1.6}
    header {position:fixed;top:0;left:0;right:0;height:68px;background:rgba(255,255,255,0.97);backdrop-filter:blur(14px);border-bottom:1px solid rgba(0,0,0,0.06);z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 48px;box-shadow:0 2px 20px rgba(0,0,0,0.06)}
    .logo {font-family:'Playfair Display',serif;font-size:20px;font-weight:500;letter-spacing:0.04em;text-decoration:none;color:var(--primary);transition:opacity 0.3s}
    .logo:hover {opacity:0.7}
    .header-actions {display:flex;align-items:center;gap:24px}
    .back-link {font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--secondary);cursor:pointer;transition:color 0.3s;background:none;border:none;padding:4px 0}
    .back-link:hover {color:var(--primary)}
    main {margin-top:68px;min-height:calc(100vh - 68px);display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .auth-container {width:100%;max-width:440px;background:white;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.08);overflow:hidden}
    .auth-tabs {display:flex;border-bottom:1px solid var(--border)}
    .tab-btn {flex:1;padding:18px;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;color:var(--secondary);font-weight:500;transition:all 0.3s ease;position:relative}
    .tab-btn.active {color:var(--primary)}
    .tab-btn.active::after {content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--primary)}
    .tab-content {display:none;padding:48px 40px;animation:fadeIn 0.3s ease}
    .tab-content.active {display:block}
    @keyframes fadeIn {from {opacity:0;transform:translateY(10px)}to {opacity:1;transform:translateY(0)}}
    .form-group {margin-bottom:20px}
    .form-label {display:block;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--secondary);margin-bottom:8px;font-weight:600}
    .form-input {width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--primary);transition:all 0.3s ease;background:white}
    .form-input:focus {outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(17,17,17,0.05)}
    .form-input::placeholder {color:#ccc}
    .message {padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;border:1.5px solid transparent;animation:slideIn 0.3s ease}
    @keyframes slideIn {from {opacity:0;transform:translateY(-8px)}to {opacity:1;transform:translateY(0)}}
    .message.success {background:#f0faf4;border-color:#b2dfcb;color:var(--success);display:block}
    .message.error {background:#fff5f5;border-color:#f5c6c6;color:var(--error);display:block}
    .submit-btn {width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;cursor:pointer;transition:all 0.3s ease;margin-top:24px}
    .submit-btn:hover {background:#333;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
    .submit-btn:active {transform:translateY(0)}
    .submit-btn:disabled {opacity:0.6;cursor:not-allowed;transform:none}
    footer {background:var(--background);padding:48px 24px;text-align:center;border-top:1px solid var(--border);margin-top:40px;font-size:13px;color:var(--secondary)}
    @media (max-width:640px) {header {padding:0 24px}.auth-container {border-radius:12px}.tab-content {padding:40px 24px}main {padding:30px 16px}}
    .loading {position:relative;color:transparent}
    .loading::after {content:'';position:absolute;inset:0;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin {to {transform:rotate(360deg)}}
    *:focus-visible {outline:2px solid var(--primary);outline-offset:2px}
  </style>
</head>
<body>
<header><a href="index.html" class="logo">Ninetynine</a><div class="header-actions"><button class="back-link">← Back</button></div></header>
<main><div class="auth-container"><div class="auth-tabs"><button class="tab-btn active" data-tab="login">Login</button><button class="tab-btn" data-tab="signup">Sign Up</button></div><div class="tab-content active" id="login-tab"><div id="login-message" class="message"></div><form id="login-form"><div class="form-group"><label class="form-label">Email or Username</label><input type="text" class="form-input" id="login-email" placeholder="example@email.com or username" required></div><div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="login-password" placeholder="Enter your password" required></div><button type="submit" class="submit-btn">Login</button></form></div><div class="tab-content" id="signup-tab"><div id="signup-message" class="message"></div><form id="signup-form"><div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="signup-fullname" placeholder="John Doe" required></div><div class="form-group"><label class="form-label">Username</label><input type="text" class="form-input" id="signup-username" placeholder="johndoe" required></div><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="signup-email" placeholder="example@email.com" required></div><div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="signup-password" placeholder="Create a strong password" required></div><button type="submit" class="submit-btn">Sign Up</button></form></div></div></main>
<footer><p>© 2024 Ninetynine. All rights reserved. | <a href="#" style="color:inherit;text-decoration:none;">Privacy Policy</a> | <a href="#" style="color:inherit;text-decoration:none;">Terms</a></p></footer>
<script src="js/auth-page.js"></script>
</body>
</html>
