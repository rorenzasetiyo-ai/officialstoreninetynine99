<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>
NINETYNINE - Checkout</title>
<link rel="stylesheet" href="css/style.css"><style>
* { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f9f9; } .checkout-container { max-width: 1000px; margin: 0 auto; padding: 20px; } .checkout-header h1 { font-size: 28px; margin-bottom: 30px; text-align: center; } .checkout-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; } .checkout-section { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); } .section-title h2 { font-size: 18px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; } .form-group { margin-bottom: 20px; } .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; } .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 14px; } .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; } .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f9f9f9; border-radius: 6px; margin-bottom: 10px; } .item-details { flex: 1; } .item-name { font-weight: 600; } .item-size { font-size: 12px; color: #999; } .item-price { font-weight: 600; } .order-summary { background: #f9f9f9; padding: 20px; border-radius: 6px; margin-top: 20px; } .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; } .summary-row.total { font-size: 18px; font-weight: bold; padding-top: 10px; border-top: 1px solid #ddd; } .btn-checkout { width: 100%; padding: 15px; background: #000; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: all 0.3s; } .btn-checkout:hover { background: #333; } .btn-checkout:disabled { background: #ccc; cursor: not-allowed; } .btn-back { display: inline-block; margin-bottom: 20px; padding: 10px 20px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; text-decoration: none; color: #333; font-weight: 600; } .btn-back:hover { background: #e0e0e0; } .message { padding: 15px; border-radius: 4px; margin-bottom: 20px; } .message.success { background: #d4edda; color: #155724; } .message.error { background: #f8d7da; color: #721c24; } .message.info { background: #d1ecf1; color: #0c5460; } .empty-cart { text-align: center; padding: 40px; color: #999; } @media (max-width: 768px) { .checkout-grid { grid-template-columns: 1fr; } .form-row { grid-template-columns: 1fr; } .cart-item { flex-direction: column; text-align: left; } }</style>
</head>
<body><div class="checkout-container"><a href="/" class="btn-back">
← Lanjutkan Belanja</a>
<div class="checkout-header"><h1>
🛒 Checkout</h1>
</div>
<div id="message"></div>
<div class="checkout-grid"><div class="checkout-section"><div class="section-title"><h2>
📦 Informasi Pengiriman</h2>
</div>
<form id="checkoutForm" onsubmit="submitCheckout(event)"><div class="form-group"><label>
Nama Lengkap *</label>
<input type="text" id="fullName" required></div>
<div class="form-group"><label>
Email *</label>
<input type="email" id="email" required></div>
<div class="form-group"><label>
Nomor Telepon *</label>
<input type="tel" id="phone" required></div>
<div class="form-group"><label>
Alamat Lengkap *</label>
<textarea id="address" rows="3" required></textarea>
</div>
<div class="form-row"><div class="form-group"><label>
Kota *</label>
<input type="text" id="city" required></div>
<div class="form-group"><label>
Kode Pos *</label>
<input type="text" id="zipcode" required></div>
</div>
<div class="section-title"><h2>
🚚 Metode Pengiriman</h2>
</div>
<div class="form-group"><label>
Pilih Kurir *</label>
<select id="shippingMethod" required><option value="">
-- Pilih Kurir --</option>
<option value="jne">
JNE (3-5 hari kerja) - Rp 50.000</option>
<option value="jnt">
J&T Express (2-3 hari kerja) - Rp 45.000</option>
<option value="gojek">
GoSend (same-day) - Rp 100.000</option>
</select>
</div>
<div class="section-title"><h2>
💳 Metode Pembayaran</h2>
</div>
<div class="form-group"><label>
Pilih Metode Pembayaran *</label>
<select id="paymentMethod" required><option value="">
-- Pilih Metode --</option>
<option value="transfer">
Transfer Bank</option>
<option value="gopay">
GoPay</option>
<option value="ovo">
OVO</option>
<option value="dana">
DANA</option>
<option value="cc">
Credit Card</option>
</select>
</div>
<div class="form-group"><label>
Catatan Pesanan (opsional)</label>
<textarea id="notes" rows="2" placeholder="Catatan khusus untuk seller..."></textarea>
</div>
<button type="submit" class="btn-checkout">
✓ Konfirmasi Pesanan</button>
</form>
</div>
<div class="checkout-section"><div class="section-title"><h2>
📋 Ringkasan Pesanan</h2>
</div>
<div id="cartItems"></div>
<div class="order-summary"><div class="summary-row"><span>
Subtotal</span>
<span id="subtotal">
Rp 0</span>
</div>
<div class="summary-row"><span>
Ongkos Kirim</span>
<span id="shipping">
Rp 0</span>
</div>
<div class="summary-row total"><span>
TOTAL</span>
<span id="total">
Rp 0</span>
</div>
</div>
<div style="margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 4px; font-size: 12px; color: #666;"><strong>
📌 Pesanan akan dikonfirmasi dalam 1x24 jam ke email Anda</strong>
</div>
</div>
</div>
</div>
<script>
let cartItems = []; let shippingCost = 0; function init() { loadCart(); renderCart(); // Auto-fill email from URL const params = new URLSearchParams(window.location.search); if (params.get('email')) { document.getElementById('email').value = params.get('email'); } // Update shipping on selection document.getElementById('shippingMethod').addEventListener('change', (e) =>
{ const costs = { jne: 50000, jnt: 45000, gojek: 100000 }; shippingCost = costs[e.target.value] || 0; updateTotal(); }); } function loadCart() { cartItems = JSON.parse(localStorage.getItem('ninetynine_cart') || '[]'); } function renderCart() { const container = document.getElementById('cartItems'); if (cartItems.length === 0) { container.innerHTML = '<div class="empty-cart">
Keranjang kosong.<a href="/">
Kembali ke toko</a>
</div>
'; document.getElementById('checkoutForm').style.display = 'none'; return; } let html = ''; let subtotal = 0; cartItems.forEach((item, idx) =>
{ const price = parseInt(item.price.replace(/\D/g, '')) * item.quantity; subtotal += price; html += `<div class="cart-item"><div class="item-details"><div class="item-name">
${item.name}</div>
<div class="item-size">
Size: ${item.size} | Qty: ${item.quantity}</div>
</div>
<div class="item-price">
Rp ${price.toLocaleString()}</div>
</div>
`; }); container.innerHTML = html; document.getElementById('subtotal').textContent = 'Rp ' + subtotal.toLocaleString(); updateTotal(); } function updateTotal() { const subtotal = parseInt(document.getElementById('subtotal').textContent.replace(/\D/g, '')); const total = subtotal + shippingCost; document.getElementById('shipping').textContent = 'Rp ' + shippingCost.toLocaleString(); document.getElementById('total').textContent = 'Rp ' + total.toLocaleString(); } function submitCheckout(e) { e.preventDefault(); if (cartItems.length === 0) { showMessage('Keranjang kosong!', 'error'); return; } const order = { date: new Date().toISOString(), fullName: document.getElementById('fullName').value, email: document.getElementById('email').value, phone: document.getElementById('phone').value, address: document.getElementById('address').value, city: document.getElementById('city').value, zipcode: document.getElementById('zipcode').value, shipping: document.getElementById('shippingMethod').value, payment: document.getElementById('paymentMethod').value, notes: document.getElementById('notes').value, items: cartItems, subtotal: document.getElementById('subtotal').textContent, shippingCost: 'Rp ' + shippingCost.toLocaleString(), total: document.getElementById('total').textContent }; // Save order let orders = JSON.parse(localStorage.getItem('ninetynine_orders') || '[]'); orders.push(order); localStorage.setItem('ninetynine_orders', JSON.stringify(orders)); // Clear cart localStorage.setItem('ninetynine_cart', '[]'); showMessage('✅ Pesanan berhasil dibuat! Cek email untuk konfirmasi.', 'success'); // Send email notification (mock) sendOrderEmail(order); setTimeout(() =>
{ window.location.href = '/order-confirmation.html?order=' + btoa(JSON.stringify(order)); }, 2000); } function sendOrderEmail(order) { // In production, use EmailJS or backend API console.log('Order created:', order); } function showMessage(text, type) { const msg = document.getElementById('message'); msg.innerHTML = text; msg.className = 'message ' + type; window.scrollTo({ top: 0, behavior: 'smooth' }); } init();</script>
</body>
</html>
