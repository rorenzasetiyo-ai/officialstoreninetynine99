<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesanan Berhasil — Ninetynine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../assets/icons/favicon.svg">
</head>
<body>
<!-- ORDER SUCCESS PAGE — Step 3 -->
<div id="confirmationPage" style="display:block;position:relative;inset:0;z-index:10003;background:#f5f5f5;overflow-y:auto;">
  <header style="position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid #eee;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
    <div style="max-width:680px;margin:0 auto;padding:0 16px;display:flex;align-items:center;height:56px;">
      <span style="font-family:'Playfair Display',serif;font-size:17px;font-weight:500;flex:1;text-align:center;">Pesanan Selesai</span>
    </div>
  </header>
  <div style="max-width:680px;margin:0 auto;padding:20px 16px 80px;">

    <!-- Success card -->
    <div style="background:#fff;border-radius:16px;padding:32px 20px;text-align:center;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
      <div style="width:72px;height:72px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#2e7d32" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h1 style="font-family:'Playfair Display',serif;font-size:22px;font-weight:500;color:#111;margin:0 0 6px;">Pembayaran Dikonfirmasi! 🎉</h1>
      <p style="font-family:'DM Sans',sans-serif;font-size:13px;color:#888;margin:0 0 16px;">Pesananmu sedang diproses oleh Ninetynine</p>
      <div style="background:#f5f5f5;border-radius:10px;padding:12px 20px;display:inline-block;">
        <p style="font-family:'DM Sans',sans-serif;font-size:10px;color:#888;margin:0 0 2px;letter-spacing:0.12em;">NOMOR PESANAN</p>
        <p id="confOrderId" style="font-family:'DM Sans',sans-serif;font-size:18px;font-weight:700;color:#111;margin:0;letter-spacing:0.1em;"></p>
      </div>
      <!-- Email status -->
      <div id="emailSendingNotice" style="margin-top:12px;padding:10px 14px;background:#fff8e1;border-radius:8px;display:block;">
        <p style="font-family:'DM Sans',sans-serif;font-size:12px;color:#f57f17;margin:0;">⏳ Mengirim konfirmasi ke email kamu...</p>
      </div>
      <div id="emailSentNotice" style="margin-top:12px;padding:10px 14px;background:#e8f5e9;border-radius:8px;display:none;">
        <p id="emailSentText" style="font-family:'DM Sans',sans-serif;font-size:12px;color:#2e7d32;margin:0;"></p>
      </div>
    </div>

    <!-- Product list -->
    <div style="background:#fff;border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,0.05);">
      <div style="padding:14px 16px;border-bottom:1px solid #f5f5f5;">
        <span style="font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#111;">Detail Produk</span>
      </div>
      <div id="confProductList"></div>
    </div>

    <!-- Info pesanan -->
    <div style="background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,0.05);">
      <h3 style="font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#888;margin:0 0 14px;">Informasi Pesanan</h3>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div style="display:flex;justify-content:space-between;gap:12px;"><span style="font-family:'DM Sans',sans-serif;font-size:12px;color:#888;min-width:110px;">Waktu Pesan</span><span id="confDateTime" style="font-family:'DM Sans',sans-serif;font-size:12px;color:#333;text-align:right;"></span></div>
        <div style="display:flex;justify-content:space-between;gap:12px;"><span style="font-family:'DM Sans',sans-serif;font-size:12px;color:#888;min-width:110px;">Penerima</span><span id="confName" style="font-family:'DM Sans',sans-serif;font-size:12px;color:#333;font-weight:500;text-align:right;"></span></div>
        <div style="display:flex;justify-content:space-between;gap:12px;"><span style="font-family:'DM Sans',sans-serif;font-size:12px;color:#888;min-width:110px;">No. HP</span><span id="confPhone" style="font-family:'DM Sans',sans-serif;font-size:12px;color:#333;text-align:right;"></span></div>
        <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;"><span style="font-family:'DM Sans',sans-serif;font-size:12px;color:#888;min-width:110px;">Alamat</span><span id="confAddress" style="font-family:'DM Sans',sans-serif;font-size:12px;color:#333;text-align:right;max-width:200px;"></span></div>
        <div style="display:flex;justify-content:space-between;gap:12px;"><span style="font-family:'DM Sans',sans-serif;font-size:12px;color:#888;min-width:110px;">Pengiriman</span><span id="confShipping" style="font-family:'DM Sans',sans-serif;font-size:12px;color:#333;font-weight:500;text-align:right;"></span></div>
        <div style="display:flex;justify-content:space-between;gap:12px;"><span style="font-family:'DM Sans',sans-serif;font-size:12px;color:#888;min-width:110px;">Pembayaran</span><span id="confPayment" style="font-family:'DM Sans',sans-serif;font-size:12px;color:#333;font-weight:500;text-align:right;"></span></div>
      </div>
    </div>

    <!-- Price total -->
    <div style="background:#fff;border-radius:12px;padding:18px;margin-bottom:20px;box-shadow:0 1px 6px rgba(0,0,0,0.05);">
      <div id="confPriceSummary"></div>
    </div>

    <!-- Buttons -->
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button onclick="closeConfirmationPage()" style="width:100%;padding:14px;background:#111;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;font-weight:600;color:#fff;cursor:pointer;transition:background 0.2s;" onmouseover="this.style.background='#333'" onmouseout="this.style.background='#111'">Kembali Belanja</button>
      <button onclick="openAccountPage()" style="width:100%;padding:14px;background:#fff;border:1.5px solid #111;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:#111;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;" onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='#fff'">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Lihat Riwayat Pembelian
      </button>
      <button onclick="window.print()" style="width:100%;padding:14px;background:#fff;border:1.5px solid #ddd;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#777;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Cetak / Simpan PDF
      </button>
    </div>
  </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/product.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/checkout.js"></script>
  <script src="../js/account.js"></script>
  <script src="../js/category.js"></script>
  <script src="../js/ui.js"></script>
</body>
</html>
