<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Your Look — Ninetynine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../assets/icons/favicon.svg">
</head>
<body>
id="looksPage" style="display:block;position:relative;inset:0;z-index:9999;background:#fff;overflow-y:auto;">
  <header style="position:sticky;top:0;background:#fff;z-index:10;border-bottom:1px solid #eee;padding:0 clamp(12px,4vw,48px);">
    <div style="max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:72px;">
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="font-family:'Playfair Display',serif;font-size:20px;font-weight:500;letter-spacing:0.04em;">Ninetynine</span>
        <span style="font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#888;">/ Looks</span>
      </div>
      <button onclick="closeLooksPage()" style="background:none;border:1px solid #ddd;border-radius:50%;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:#333;transition:all 0.2s;" onmouseover="this.style.background='#000';this.style.color='#fff'" onmouseout="this.style.background='none';this.style.color='#333'">×</button>
    </div>
  </header>
  <div style="max-width:1440px;margin:0 auto;padding:48px clamp(12px,4vw,48px) 80px;">
    <div style="margin-bottom:40px;">
      <span style="font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:0.25em;text-transform:uppercase;color:#888;display:block;margin-bottom:10px;">Style Inspiration</span>
      <h1 style="font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,48px);font-weight:500;color:#000;margin:0;">Get Your Look</h1>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(min(260px,calc(50% - 8px)),1fr));gap:24px 20px;">

      <!-- Look 1 -->
      <div style="cursor:pointer;transition:transform 0.3s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
        <div style="background:#F6F1E9;border-radius:16px;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative;overflow:hidden;">
          <span style="font-family:'Playfair Display',serif;font-size:48px;font-weight:400;color:rgba(0,0,0,0.12);user-select:none;">1</span>
          <div style="position:absolute;bottom:16px;left:16px;right:16px;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);border-radius:8px;padding:10px 14px;">
            <p style="font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#999;margin:0 0 2px;">Style Guide</p>
            <p style="font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:#111;margin:0;">Look 1</p>
          </div>
        </div>
      </div>

      <!-- Look 2 -->
      <div style="cursor:pointer;transition:transform 0.3s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
        <div style="background:#EDE8E2;border-radius:16px;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative;overflow:hidden;">
          <span style="font-family:'Playfair Display',serif;font-size:48px;font-weight:400;color:rgba(0,0,0,0.12);user-select:none;">2</span>
          <div style="position:absolute;bottom:16px;left:16px;right:16px;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);border-radius:8px;padding:10px 14px;">
            <p style="font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#999;margin:0 0 2px;">Style Guide</p>
            <p style="font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:#111;margin:0;">Look 2</p>
          </div>
        </div>
      </div>

      <!-- Look 3 -->
      <div style="cursor:pointer;transition:transform 0.3s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
        <div style="background:#E8E4DF;border-radius:16px;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative;overflow:hidden;">
          <span style="font-family:'Playfair Display',serif;font-size:48px;font-weight:400;color:rgba(0,0,0,0.12);user-select:none;">3</span>
          <div style="position:absolute;bottom:16px;left:16px;right:16px;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);border-radius:8px;padding:10px 14px;">
            <p style="font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#999;margin:0 0 2px;">Style Guide</p>
            <p style="font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:#111;margin:0;">Look 3</p>
          </div>
        </div>
      </div>

      <!-- Look 4 -->
      <div style="cursor:pointer;transition:transform 0.3s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
        <div style="background:#E2DDD7;border-radius:16px;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;margin-bottom:16px;position:relative;overflow:hidden;">
          <span style="font-family:'Playfair Display',serif;font-size:48px;font-weight:400;color:rgba(0,0,0,0.12);user-select:none;">4</span>
          <div style="position:absolute;bottom:16px;left:16px;right:16px;background:rgba(255,255,255,0.85);backdrop-filter:blur(8px);border-radius:8px;padding:10px 14px;">
            <p style="font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#999;margin:0 0 2px;">Style Guide</p>
            <p style="font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:#111;margin:0;">Look 4</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/state.js"></script>
  <script src="../js/product.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/checkout.js"></script>
  <script src="../js/account.js"></script>
  <script src="../js/category.js"></script>
  <script src="../js/ui.js"></script>
</body>
</html>
